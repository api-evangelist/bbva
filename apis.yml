aid: bbva
url: https://raw.githubusercontent.com/api-evangelist/bbva/refs/heads/main/apis.yml
name: BBVA
description: >-
  BBVA is a multinational Spanish financial services group operating in over 30 countries.
  The BBVA API Market provides a comprehensive catalog of banking APIs covering accounts,
  payments, collections, financing, identity, and open data across Spain, Mexico, Latin
  America, and other global markets. BBVA is a recognized open banking leader offering
  PSD2-compliant APIs, treasury management solutions, and digital ecosystem integrations.
type: Index
