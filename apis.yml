  - Banking
  - Financial Services
  - Open Banking
  - PSD2
  - Spain
  - Mexico
access: 3rd-Party
created: '2025-02-08'
modified: '2026-04-19'
position: Consumer
specificationVersion: '0.19'
apis:
  - aid: bbva:accounts-psd2
    name: BBVA Accounts PSD2 API
    description: >-
      PSD2-compliant account information service (AIS) API for Spain. Allows
      authorized third parties to access customer payment account information
      including account lists, balances, transaction history, and account holder
      details. Requires a PSD2 AIS license and registration through the Redsys platform.
    humanURL: https://www.bbvaapimarket.com/en/banking-apis/es-account-information-psd2/
    tags:
      - Banking
      - Accounts
      - PSD2
      - Spain
      - Open Banking
    properties:
      - type: Documentation
        url: https://www.bbvaapimarket.com/en/banking-apis/es-account-information-psd2/

  - aid: bbva:payments-psd2
    name: BBVA Payments PSD2 API
    description: >-
      PSD2-compliant payment initiation service (PIS) API for Spain. Allows authorized
      third parties to initiate payments on behalf of customers including SEPA transfers,
      immediate payments, Bank of Spain FMO payments, and international transfers.
      Requires a PSD2 PIS license and registration through the Redsys platform.
    humanURL: https://www.bbvaapimarket.com/en/banking-apis/es-payments-psd2/
    tags:
      - Banking
      - Payments
      - PSD2
      - Spain
      - Open Banking
    properties:
      - type: Documentation
        url: https://www.bbvaapimarket.com/en/banking-apis/es-payments-psd2/

  - aid: bbva:mexico-business-payments
    name: BBVA Mexico Business Payments API
    description: >-
      Business payment processing API for Mexico enabling bulk payments, payroll
      disbursements, and supplier payments through BBVA Mexico's banking infrastructure.
      Supports SPEI transfers and other Mexican payment systems.
    humanURL: https://www.bbvaapimarket.com/en/banking-apis/
    tags:
      - Banking
      - Payments
      - Mexico
      - Business Banking
    properties:
      - type: Documentation
        url: https://www.bbvaapimarket.com/en/banking-apis/

  - aid: bbva:locations
    name: BBVA Locations API
    description: >-
      Open data API providing access to BBVA branch and ATM location data.
      Available for Spain and Mexico, this API returns geolocation data, operating
      hours, services available, and accessibility information for all BBVA branches
      and ATMs.
    humanURL: https://www.bbvaapimarket.com/en/banking-apis/
    tags:
      - Banking
      - Open Data
      - Locations
    properties:
      - type: Documentation
        url: https://www.bbvaapimarket.com/en/banking-apis/

